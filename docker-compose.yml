services:
  db:
    image: postgres:16
    container_name: calendar-budget-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: calendar_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in calendar-backend/.env}
      POSTGRES_DB: calendar_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendar_user -d calendar_db"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  postgres_data:
